<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2d5a27">
    <meta
      name="description"
      content="PWA de captura geoespacial para exploracion de campo con ArcGIS, soporte offline e IndexedDB."
    >
    <title>PWA Exploracion</title>
    <script type="importmap">
      {
        "imports": {
          "luxon": "./vendor/arcgis/luxon/build/es6/luxon.js",
          "luxon/": "./vendor/arcgis/luxon/",
          "marked": "./vendor/arcgis/marked/lib/marked.esm.js",
          "marked/": "./vendor/arcgis/marked/",
          "@zip.js/zip.js": "./vendor/arcgis/@zip.js/zip.js/index.js",
          "@zip.js/zip.js/": "./vendor/arcgis/@zip.js/zip.js/",
          "@esri/arcgis-html-sanitizer": "./vendor/arcgis/@esri/arcgis-html-sanitizer/dist/esm/index.js",
          "@esri/arcgis-html-sanitizer/": "./vendor/arcgis/@esri/arcgis-html-sanitizer/",
          "@esri/calcite-components": "./vendor/arcgis/@esri/calcite-components/dist/components/index.js",
          "@esri/calcite-components/": "./vendor/arcgis/@esri/calcite-components/",
          "@vaadin/grid": "./vendor/arcgis/@vaadin/grid/vaadin-grid.js",
          "@vaadin/grid/": "./vendor/arcgis/@vaadin/grid/"
        }
      }
    </script>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./assets/icons/icon-192.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="stylesheet" href="./css/app.css">
  </head>
  <body>
    <script src="./js/vendor/proj4.js"></script>
    <div id="app" class="app-shell"></div>
    <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>
    <dialog id="app-modal" class="app-modal"></dialog>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
